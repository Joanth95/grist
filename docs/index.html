<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace étudiant — Planning de stage</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Écran de connexion -->
  <section id="login-screen" class="screen">
    <div class="login-card">
      <h1>Espace étudiant</h1>
      <p class="subtitle">Planning de stage</p>
      <form id="login-form">
        <label for="login-code">Code anonymat</label>
        <input type="text" id="login-code" autocomplete="off" autocapitalize="characters"
               placeholder="Ex. : J150398D" required pattern="[A-Za-z][0-9]{6}[A-Za-z]"
               title="1ère lettre du prénom + date de naissance JJMMAA + 1ère lettre du nom">
        <button type="submit" class="btn btn-primary" id="login-btn">Se connecter</button>
        <p id="login-error" class="error" hidden></p>
      </form>
      <p class="hint">
        Votre code anonymat = 1ère lettre du prénom + date de naissance (JJMMAA)
        + 1ère lettre du nom, en majuscules.<br>
        <em>Exemple : Jean DUPONT né le 15/03/1998 → J150398D</em>
      </p>
    </div>
  </section>

  <!-- Application -->
  <section id="app-screen" class="screen" hidden>
    <header class="app-header">
      <div>
        <h1>Mon planning de stage</h1>
        <p id="student-name" class="subtitle"></p>
      </div>
      <button id="logout-btn" class="btn btn-ghost">Se déconnecter</button>
    </header>

    <main class="content">
      <div id="periode-info"></div>
      <div id="weeks"></div>
      <button id="add-week-btn" class="btn btn-primary" hidden>+ Ajouter une semaine</button>
    </main>
  </section>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
