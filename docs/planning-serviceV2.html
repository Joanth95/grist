<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Planning de service - Mois entier</title>
<link rel="stylesheet" href="styles.css?v=25">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root { --accent: #000091; }
  body { background: var(--gris-fond); padding: 0; }
  .app-header { background: var(--blanc); border-bottom: 4px solid var(--bleu); padding: 1rem 1.25rem; }
  .controls { background: var(--blanc); padding: 1.25rem; border-radius: var(--radius); box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; }
  .controls label { font-weight: 600; color: var(--texte); }
  select, input[type="date"] { padding: 0.65rem 0.9rem; border: 1px solid var(--gris-bordure); border-radius: 4px; }
  .tablewrap { background: var(--blanc); border-radius: var(--radius); box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow-x: auto; }
  table { font-size: 0.88rem; width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #ccc; padding: 7px 4px; text-align: center; font-size: 0.9rem; }
  th.student, td.student { position: sticky; left: 0; background: #f6f6f6; min-width: 210px; text-align: left; z-index: 3; font-weight: 700; }
  thead th { background: #f0f0f0; position: sticky; top: 0; z-index: 2; font-weight: 700; color: var(--bleu); }
  th.weekend { background: #fff3e0; }
  @media print {
    body { padding: 5mm; background: white; }
    .app-header, .controls, #status { display: none !important; }
    h1 { font-size: 14pt; margin-bottom: 4px; }
    .subtitle { font-size: 9pt; color: #333; }
    .tablewrap { margin: 8px 0; border: 1px solid #333; }
    table { 
      font-size: 8pt; 
      width: 100%;
    }
    th, td { 
      padding: 4px 3px; 
      border: 0.5px solid #444; 
    }
    th.student, td.student { 
      min-width: 130px; 
      background: #f0f0f0; 
      font-weight: 700;
    }
    thead th { 
      background: #e0e0e0; 
      font-size: 7pt;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      padding: 6px 4px;
      height: 105px;
      vertical-align: bottom;
      white-space: nowrap;
    }
    .daynum { 
      font-weight: 700; 
      font-size: 7.5pt;
    }
    .dayname {
      font-size: 6.5pt;
      opacity: 0.85;
    }
    .legend { font-size: 7.5pt; margin-top: 10px; }
    .print-footer {
      position: fixed; bottom: 4mm; left: 0; right: 0;
      text-align: center; font-size: 7pt; color: #555;
      border-top: 0.5px solid #ccc; padding-top: 3px;
    }
    @page {
      size: landscape;
      margin: 4mm;
    }
  }
</style>
</head>
<body>
<header class="app-header">
  <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
    <div>
      <h1 style="margin: 0 0 4px 0;">📋 Planning de service</h1>
      <p class="subtitle" style="margin: 0;">Gestion des présences et plannings étudiants</p>
    </div>
    <div style="text-align: right;">
      <span style="display: inline-block; background: #dbeafe; color: #1e40af; font-size: 0.8rem; font-weight: 700; padding: 4px 12px; border-radius: 9999px; border: 1px solid #3b82f6; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">
        v2.6 — 13/07/2026
      </span>
      <div style="font-size: 0.65rem; color: #64748b; margin-top: 3px;">
        Joan THUILLIER
      </div>
    </div>
  </div>
</header>
<div class="content">
  <div class="controls no-print">
    <label>Service</label>
    <select id="service" style="min-width: 260px;"></select>
    <label>Mois / Début</label>
    <input type="date" id="startDate">
    <label>Vue</label>
    <select id="viewMode" style="min-width: 145px;">
      <option value="month">Mois complet</option>
      <option value="31days">31 jours glissants</option>
    </select>
    <button id="today" class="btn btn-ghost">Aujourd'hui</button>
    <button id="prev" class="btn btn-ghost">◀ Préc.</button>
    <button id="next" class="btn btn-ghost">Suiv. ▶</button>
    <button id="refresh" class="btn btn-primary">Actualiser</button>
    <button id="printBtn" class="btn btn-primary">🖨️ Imprimer</button>
  </div>
  <div id="status" style="margin: 10px 0; color: var(--bleu);"></div>
  <div class="print-header" id="printHeader"></div>
  <div id="content"></div>
  <div class="print-footer">
    Document généré par <strong>GESTION ÉTUDIANT</strong> v2.6 — Conçu et développé par <strong>M. Joan THUILLIER</strong>, Cadre de Santé Apprenant, pour l'établissement
  </div>
</div>
<script>
grist.ready({requiredAccess: 'full'});

const DAY_NAMES = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

let SERVICES = null, PERIODES = null, ETUDIANTS = null, PLANNING = null, CODES = null, SORTIES = null;

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function keyToDate(key) { return new Date(key + 'T00:00:00Z'); }
function dateToKey(d) { return d.toISOString().slice(0,10); }
function addDaysKey(key, n) { const d = keyToDate(key); d.setUTCDate(d.getUTCDate()+n); return dateToKey(d); }
function epochToKey(epoch) { if (epoch == null) return null; return dateToKey(new Date(epoch*1000)); }

function fmtDateFull(key) {
  const d = keyToDate(key);
  const dd = String(d.getUTCDate()).padStart(2,'0');
  const mm = String(d.getUTCMonth()+1).padStart(2,'0');
  return dd + '/' + mm + '/' + d.getUTCFullYear();
}

function fmtDayLabel(key) {
  const d = keyToDate(key);
  const dd = String(d.getUTCDate()).padStart(2,'0');
  const mm = String(d.getUTCMonth()+1).padStart(2,'0');
  return { num: dd + '/' + mm, name: DAY_NAMES[d.getUTCDay()], isWeekend: (d.getUTCDay() === 0 || d.getUTCDay() === 6) };
}

// === NOUVEAU : calcule le début et la fin du mois complet ===
function getMonthRange(key) {
  if (!key) key = todayKey();
  const d = keyToDate(key);
  const year = d.getUTCFullYear();
  const month = d.getUTCMonth();
  const firstDay = new Date(Date.UTC(year, month, 1));
  const lastDay = new Date(Date.UTC(year, month + 1, 0));
  return {
    startKey: dateToKey(firstDay),
    endKey: dateToKey(lastDay),
    numDays: lastDay.getUTCDate()
  };
}

async function loadData() {
  document.getElementById('status').textContent = 'Chargement des données...';
  [SERVICES, PERIODES, ETUDIANTS, PLANNING, CODES, SORTIES] = await Promise.all([
    grist.docApi.fetchTable('SERVICES'),
    grist.docApi.fetchTable('PERIODES_DE_STAGE'),
    grist.docApi.fetchTable('LISTE_DES_ETUDIANTS'),
    grist.docApi.fetchTable('PLANNING_HEBDO'),
    grist.docApi.fetchTable('CODES_HORAIRES'),
    grist.docApi.fetchTable('Sortie_de_stage')
  ]);
  document.getElementById('status').textContent = '';
}

function populateServiceSelect() {
  const sel = document.getElementById('service');
  if (!sel) return [];
  const items = [];
  for (let i = 0; i < SERVICES.id.length; i++) {
    const nom = SERVICES.Nom[i] || ('Service ' + SERVICES.id[i]);
    if (SERVICES.Recoit_des_etudiant[i] !== false) items.push({ id: SERVICES.id[i], nom });
  }
  items.sort((a,b) => a.nom.localeCompare(b.nom));
  sel.innerHTML = items.length ? items.map(it => `<option value="${it.id}">${it.nom}</option>`).join('') : '<option value="">Aucun service disponible</option>';
  return items;
}

function buildCodesMap() {
  const map = {};
  for (let i = 0; i < CODES.id.length; i++) {
    map[CODES.id[i]] = {
      Code: CODES.Code[i],
      Duree: (CODES.Duree_heures[i] || 0) + (CODES.Ajustement_h[i] || 0),
      Compte: !!CODES.Compte_stage[i]
    };
  }
  return map;
}

function buildEtudiantsMap() {
  const map = {};
  for (let i = 0; i < ETUDIANTS.id.length; i++) {
    map[ETUDIANTS.id[i]] = (ETUDIANTS.NOM[i] || '') + ' ' + (ETUDIANTS.PRENOM[i] || '');
  }
  return map;
}

function pickDefaultService(items, windowStart, windowEnd) {
  const counts = {};
  for (let i = 0; i < PERIODES.id.length; i++) {
    const du = epochToKey(PERIODES.Du[i]);
    const au = epochToKey(PERIODES.Au[i]);
    if (!du || !au) continue;
    if (au < windowStart || du > windowEnd) continue;
    const sid = PERIODES.Service[i];
    counts[sid] = (counts[sid] || 0) + 1;
  }
  let best = null, bestCount = 0;
  for (const it of items) {
    const c = counts[it.id] || 0;
    if (c > bestCount) { bestCount = c; best = it.id; }
  }
  return best || (items[0] ? items[0].id : null);
}

function buildSortieIndex() {
  const idx = {};
  for (let i = 0; i < SORTIES.id.length; i++) {
    const pid = SORTIES.Pour_le_stage_du_[i];
    const dk = epochToKey(SORTIES.Date[i]);
    if (!pid || !dk) continue;
    idx[pid + '_' + dk] = {
      Compte: !!SORTIES.Compte_stage[i],
      Duree: SORTIES.Duree_heures[i] || 0,
      Motif: SORTIES.Motif[i] || ''
    };
  }
  return idx;
}

function render() {
  const startKey = document.getElementById('startDate').value;
  const serviceSelect = document.getElementById('service');
  const serviceId = serviceSelect ? parseInt(serviceSelect.value, 10) : null;
  const content = document.getElementById('content');

  if (!startKey || !serviceId) {
    content.innerHTML = '<div class="empty">Sélectionnez un service et une période.</div>';
    return;
  }

  const viewMode = document.getElementById('viewMode') ? document.getElementById('viewMode').value : 'month';

  let windowStart, windowEnd, days = [];

  if (viewMode === '31days') {
    // Mode 31 jours glissants (comportement original)
    windowStart = startKey;
    for (let i = 0; i < 31; i++) {
      days.push(addDaysKey(startKey, i));
    }
    windowEnd = days[30];
  } else {
    // Mode Mois complet
    const monthRange = getMonthRange(startKey);
    windowStart = monthRange.startKey;
    windowEnd = monthRange.endKey;
    let currentDay = windowStart;
    for (let i = 0; i < monthRange.numDays; i++) {
      days.push(currentDay);
      currentDay = addDaysKey(currentDay, 1);
    }
  }

  const codesMap = buildCodesMap();
  const etudiantsMap = buildEtudiantsMap();
  const sortieIdx = buildSortieIndex();

  const matches = [];
  for (let i = 0; i < PERIODES.id.length; i++) {
    if (PERIODES.Service[i] !== serviceId) continue;
    const du = epochToKey(PERIODES.Du[i]);
    const au = epochToKey(PERIODES.Au[i]);
    if (!du || !au) continue;
    if (au < windowStart || du > windowEnd) continue;
    matches.push({
      periodeId: PERIODES.id[i],
      etudiantId: PERIODES.Etudiant[i],
      du, au,
      niveau: PERIODES.Niveau[i] || '',
      tuteur: PERIODES.Tuteur[i] || ''
    });
  }

  if (matches.length === 0) {
    content.innerHTML = '<div class="empty">Aucun étudiant sur ce service pour ce mois.</div>';
    return;
  }

  matches.sort((a,b) => (etudiantsMap[a.etudiantId] || '').localeCompare(etudiantsMap[b.etudiantId] || ''));

  const dayCodeCols = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  const periodeDayMap = {};
  for (let i = 0; i < PLANNING.id.length; i++) {
    const pid = PLANNING.Periode[i];
    const semStart = epochToKey(PLANNING.Semaine_debut[i]);
    if (!semStart) continue;
    if (!periodeDayMap[pid]) periodeDayMap[pid] = {};
    for (let off = 0; off < 7; off++) {
      const dk = addDaysKey(semStart, off);
      periodeDayMap[pid][dk] = { rowId: PLANNING.id[i], col: dayCodeCols[off], coderef: PLANNING[dayCodeCols[off]][i] };
    }
  }

  let html = '<div class="tablewrap"><table><thead><tr><th class="student">Étudiant</th>';
  for (const dk of days) {
    const lbl = fmtDayLabel(dk);
    html += `<th class="${lbl.isWeekend ? 'weekend' : ''}"><span class="daynum">${lbl.num}</span><span class="dayname">${lbl.name}</span></th>`;
  }
  html += '</tr></thead><tbody>';

  for (const m of matches) {
    const nom = etudiantsMap[m.etudiantId] || '—';
    const infoParts = [];
    if (m.niveau) infoParts.push(m.niveau);
    infoParts.push(fmtDateFull(m.du) + ' → ' + fmtDateFull(m.au));
    if (m.tuteur) infoParts.push('Tuteur : ' + m.tuteur);
    const infoLine = infoParts.join(' · ').replace(/</g,'&lt;');
    html += `<tr><td class="student"><div class="student-name">${nom}</div><div class="student-info">${infoLine}</div></td>`;

    for (const dk of days) {
      if (dk < m.du || dk > m.au) {
        html += '<td class="hors-periode"></td>';
        continue;
      }
      const cellInfo = (periodeDayMap[m.periodeId] || {})[dk];
      const coderef = cellInfo ? cellInfo.coderef : null;
      const code = coderef ? codesMap[coderef] : null;
      const sortie = sortieIdx[m.periodeId + '_' + dk];

      let cls = '', text = '', title = '';
      if (sortie) {
        if (sortie.Compte) {
          cls = 'sortie-oui';
          text = `<span class="badge badge-oui">${code ? code.Code + '+' : ''}S</span>`;
          title = (sortie.Motif || 'Sortie comptée') + ' (' + sortie.Duree + 'h)';
        } else {
          cls = 'sortie-non';
          text = `<span class="badge badge-non">${code ? code.Code : ''} ✕</span>`;
          title = sortie.Motif || 'Absence non comptée';
        }
      } else if (code) {
        text = code.Code;
        if (code.Code === 'R' || code.Code === 'ABS') cls = 'repos';
        title = code.Code + (code.Duree ? ' (' + code.Duree + 'h)' : '');
      }

      let dataAttrs = '';
      if (cellInfo) {
        cls += (cls ? ' ' : '') + 'editable';
        dataAttrs = ` data-row-id="${cellInfo.rowId}" data-col="${cellInfo.col}" data-coderef="${coderef || ''}"`;
        if (!title) title = 'Cliquer pour modifier';
      }
      html += `<td class="${cls}"${dataAttrs} title="${title.replace(/"/g,'&quot;')}">${text}</td>`;
    }
    html += '</tr>';
  }

  html += '</tbody></table></div>';

  // Légende
  const legendParts = [];
  const seen = {};
  for (let i = 0; i < CODES.id.length; i++) {
    const c = CODES.Code[i];
    if (seen[c]) continue;
    seen[c] = true;
    legendParts.push(`<span class="chip"><strong>${c}</strong>&nbsp;${CODES.Libelle[i] || ''}</span>`);
  }
  legendParts.push('<span class="chip"><span class="badge badge-oui">Code+S</span> sortie comptée</span>');
  legendParts.push('<span class="chip"><span class="badge badge-non">✕</span> absence non comptée</span>');
  legendParts.push('<span class="chip"><span class="swatch" style="background:#f6f6f6;"></span> hors période de stage</span>');
  html += `<div class="legend">${legendParts.join('')}</div>`;

  content.innerHTML = html;

  // En-tête impression
  const serviceLabel = serviceSelect && serviceSelect.selectedOptions[0] ? serviceSelect.selectedOptions[0].textContent : '';
  const now = new Date();
  const genDate = String(now.getDate()).padStart(2,'0') + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + now.getFullYear() + ' à ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const currentViewMode = document.getElementById('viewMode') ? document.getElementById('viewMode').value : 'month';
  const periodLabel = (currentViewMode === '31days') ? 'Période 31 jours' : 'Mois complet';
  document.getElementById('printHeader').innerHTML = `<h1>Planning de service — ${serviceLabel}</h1><p class="subtitle">${periodLabel} : du ${fmtDayLabel(windowStart).num} au ${fmtDayLabel(windowEnd).num} • Généré le ${genDate}</p>`;
}

function codesListSorted() {
  const list = [];
  for (let i = 0; i < CODES.id.length; i++) {
    list.push({ id: CODES.id[i], code: CODES.Code[i] || '?', libelle: CODES.Libelle[i] || '' });
  }
  list.sort((a, b) => a.code.localeCompare(b.code));
  return list;
}

function startEditCell(td) {
  const rowId = parseInt(td.dataset.rowId, 10);
  const col = td.dataset.col;
  const currentCoderef = td.dataset.coderef ? parseInt(td.dataset.coderef, 10) : null;
  const originalHTML = td.innerHTML;

  const select = document.createElement('select');
  select.className = 'cell-edit-select';

  const optEmpty = document.createElement('option');
  optEmpty.value = '';
  optEmpty.textContent = '(vide)';
  if (!currentCoderef) optEmpty.selected = true;
  select.appendChild(optEmpty);

  for (const c of codesListSorted()) {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.code + (c.libelle ? ' — ' + c.libelle : '');
    if (currentCoderef === c.id) opt.selected = true;
    select.appendChild(opt);
  }

  td.innerHTML = '';
  td.appendChild(select);
  select.focus();

  let done = false;

  function commit() {
    if (done) return;
    done = true;
    const val = select.value;
    const newCoderef = val ? parseInt(val, 10) : null;
    if (newCoderef === currentCoderef) {
      td.innerHTML = originalHTML;
      return;
    }
    saveCode(rowId, col, newCoderef, td);
  }

  function cancel() {
    if (done) return;
    done = true;
    td.innerHTML = originalHTML;
  }

  select.addEventListener('change', commit);
  select.addEventListener('blur', () => setTimeout(cancel, 0));
}

async function saveCode(rowId, col, newCoderef, td) {
  td.className += ' saving';
  td.innerHTML = '';
  try {
    await grist.docApi.applyUserActions([['UpdateRecord', 'PLANNING_HEBDO', rowId, { [col]: newCoderef }]]);
    await loadData();
    render();
  } catch (err) {
    alert('Erreur lors de la mise à jour : ' + err.message);
    await loadData();
    render();
  }
}

document.getElementById('content').addEventListener('click', function (e) {
  const td = e.target.closest('td.editable');
  if (!td || td.querySelector('select')) return;
  startEditCell(td);
});

// === Navigation intelligente selon le mode de vue ===
function shiftWindow(delta) {
  const viewMode = document.getElementById('viewMode') ? document.getElementById('viewMode').value : 'month';
  let cur = document.getElementById('startDate').value;
  if (!cur) cur = todayKey();
  const d = keyToDate(cur);

  if (viewMode === '31days') {
    // Décalage de 31 jours
    d.setUTCDate(d.getUTCDate() + (delta * 31));
  } else {
    // Mois complet : on passe au mois suivant/précédent (au 1er)
    d.setUTCMonth(d.getUTCMonth() + delta);
    d.setUTCDate(1);
  }
  document.getElementById('startDate').value = dateToKey(d);
  render();
}

document.getElementById('startDate').addEventListener('change', render);
document.getElementById('service').addEventListener('change', render);
document.getElementById('viewMode').addEventListener('change', () => {
  // Optionnel : on peut recentrer sur le 1er du mois quand on passe en mode mois
  const mode = document.getElementById('viewMode').value;
  if (mode === 'month') {
    let cur = document.getElementById('startDate').value;
    if (cur) {
      const d = keyToDate(cur);
      d.setUTCDate(1);
      document.getElementById('startDate').value = dateToKey(d);
    }
  }
  render();
});

document.getElementById('today').addEventListener('click', () => {
  document.getElementById('startDate').value = todayKey();
  render();
});
document.getElementById('prev').addEventListener('click', () => shiftWindow(-1));
document.getElementById('next').addEventListener('click', () => shiftWindow(1));
document.getElementById('refresh').addEventListener('click', async () => { await loadData(); render(); });
document.getElementById('printBtn').addEventListener('click', () => { window.print(); });

// Raccourci clavier : appuyer sur "R" pour actualiser (sauf si on est en train de taper dans un champ)
document.addEventListener('keydown', function(e) {
  if (e.key.toLowerCase() === 'r' && !e.target.matches('input, select, textarea')) {
    e.preventDefault();
    document.getElementById('refresh').click();
  }
});

async function init() {
  await loadData();
  const items = populateServiceSelect();

  const sk = todayKey();
  document.getElementById('startDate').value = sk;

  const monthRange = getMonthRange(sk);
  const defaultService = pickDefaultService(items, monthRange.startKey, monthRange.endKey);
  const serviceEl = document.getElementById('service');
  if (defaultService && serviceEl) {
    serviceEl.value = defaultService;
  }

  render();
}

init();
</script>
</body>
</html>
