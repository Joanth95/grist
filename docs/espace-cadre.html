<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace cadre</title>
  <link rel="stylesheet" href="styles.css?v=20">
  <style>
    .content { max-width: none; padding: 0 2rem; }
    .app-header { padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 1.5rem; flex-wrap: wrap; }
    .header-main { flex: 1 1 420px; min-width: 280px; }
    .header-service-pickers { display: flex; gap: 0.9rem; flex-wrap: wrap; margin-top: 0.55rem; }
    .header-service-pickers .cadre-service-select { flex: 1 1 170px; max-width: 210px; margin: 0; }
    .header-service-pickers .cadre-service-select label { font-size: 0.68rem; font-weight: 600; margin-bottom: 0.1rem; }
    .header-service-pickers .cadre-service-select select { padding: 0.3rem 0.5rem; font-size: 0.82rem; height: 28px; }
    .main-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1.5rem 0 1rem; }
    .main-tab { background: white; border: 1px solid #ccc; border-bottom: 3px solid transparent; padding: 0.5rem 0.9rem; font-weight: 600; color: #555; cursor: pointer; }
    .main-tab.active { color: #0a3d62; border-bottom-color: #0a3d62; }
    .section-note { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }
    table.service-planning { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
    td.code-cell { cursor: pointer; }
    td.code-cell:hover { outline: 2px solid #0a3d62; outline-offset: -2px; }
    td.jour-off { background: #eee; }
    .btn { padding: 0.4rem 0.8rem; border: 1px solid #ccc; border-radius: 4px; background: white; cursor: pointer; }
    .btn-primary { background: #0a3d62; color: white; border-color: #0a3d62; }
  </style>
</head>
<body>
  <section id="login-screen" class="screen">
    <div class="login-card">
      <h1>Espace cadre</h1>
      <p class="subtitle">Piloter les étudiants de votre service</p>
      <form id="login-form">
        <label>Adresse email</label>
        <input type="email" id="login-email" required>
        <label>Code d'accès</label>
        <input type="password" id="login-code" required>
        <button type="submit" class="btn btn-primary">Se connecter</button>
        <p id="login-error" class="error" hidden></p>
      </form>
    </div>
  </section>

  <section id="app-screen" class="screen" hidden>
    <header class="app-header">
      <div class="header-main">
        <h1>Espace cadre</h1>
        <p id="cadre-info" class="subtitle"></p>
        <div class="header-service-pickers">
          <div class="cadre-service-select">
            <label>Site</label>
            <select id="site-select"></select>
          </div>
          <div class="cadre-service-select">
            <label>Service</label>
            <select id="service-select"></select>
          </div>
        </div>
      </div>
      <div class="header-actions">
        <button id="refresh-btn" class="btn">🔄</button>
        <button id="logout-btn" class="btn">Se déconnecter</button>
      </div>
    </header>

    <main class="content">
      <div class="main-tabs" id="main-tabs"></div>
      <div class="group-subtabs" id="main-subtabs" hidden></div>

      <div id="tab-dashboard"><div id="dashboard-content"></div></div>
      <div id="tab-declarations" hidden><div id="declarations-pending"></div></div>
      <div id="tab-dossier" hidden><div id="dossier-list"></div></div>
      <div id="tab-planning" hidden><div id="planning-service"></div></div>
      <div id="tab-evaluation" hidden><div id="evaluation-list"></div></div>
      <div id="tab-stats" hidden><div id="stats-content"></div></div>
      <div id="tab-codes" hidden><div id="codes-service-list"></div></div>
      <div id="tab-mailbienvenue" hidden><div id="mailbienvenue-content"></div></div>
    </main>
  </section>

  <script src="config.js?v=18"></script>
  <script src="espace-cadre.js?v=28"></script>
</body>
</html>
