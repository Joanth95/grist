<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Planning de service</title>
<link rel="stylesheet" href="styles.css?v=1">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  /* Styles spécifiques au planning (ajustements sur le DSFR) */
  :root {
    --accent: #000091;
  }
  
  body { background: var(--gris-fond); padding: 0; }
  
  .app-header {
    border-bottom: 4px solid var(--bleu);
  }
  
  .controls {
    background: var(--blanc);
    padding: 1rem 1.25rem;
    border-radius: var(--radius);
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    margin-bottom: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
  }
  
  .controls label {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--texte);
    margin-bottom: 0;
  }
  
  select, input[type="date"] {
    padding: 0.6rem 0.9rem;
    border: 1px solid var(--gris-bordure);
    border-radius: 4px;
    font-size: 0.95rem;
  }
  
  .tablewrap {
    background: var(--blanc);
    border-radius: var(--radius);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  
  table {
    font-size: 0.9rem;
    border-collapse: collapse;
    width: 100%;
  }
  
  th, td {
    padding: 8px 6px;
    text-align: center;
    border-bottom: 1px solid var(--gris-bordure);
    border-right: 1px solid var(--gris-bordure);
  }
  
  th.student, td.student {
    position: sticky;
    left: 0;
    background: var(--blanc);
    text-align: left;
    z-index: 3;
    min-width: 220px;
    font-weight: 600;
  }
  
  .student-name { font-size: 1rem; }
  .student-info { font-size: 0.8rem; color: var(--texte-doux); margin-top: 4px; line-height: 1.3; }
  
  thead th {
    background: #f6f6f6;
    position: sticky;
    top: 0;
    z-index: 2;
    font-weight: 700;
    color: var(--texte);
  }
  
  th.weekend { background: #fff3e0 !important; }
  td.hors-periode { background: #f6f6f6; color: #999; }
  td.repos { color: #666; font-weight: 600; }
  
  td.editable {
    cursor: pointer;
    transition: background 0.1s;
  }
  td.editable:hover {
    background: #eaf2fb;
    outline: 2px solid var(--bleu);
    outline-offset: -2px;
  }
  
  .badge {
    font-size: 0.8rem;
    padding: 2px 7px;
  }
  
  .legend {
    background: var(--blanc);
    padding: 1rem 1.25rem;
    border-radius: var(--radius);
    margin-top: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    font-size: 0.9rem;
  }
  
  @media print {
    body { background: white; padding: 0; }
    .controls, .no-print { display: none !important; }
    .tablewrap { box-shadow: none; }
    table { font-size: 10px; }
    th, td { padding: 4px 3px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <h1>📋 Planning de service</h1>
    <p class="subtitle">Gestion des présences et plannings étudiants</p>
  </div>
</header>

<div class="content">
  <div class="controls no-print">
    <label>Service</label>
    <select id="service"></select>
    
    <label>Début</label>
    <input type="date" id="startDate">
    
    <button id="today" class="btn btn-ghost">Aujourd'hui</button>
    <button id="prev" class="btn btn-ghost">◀ 31 jours</button>
    <button id="next" class="btn btn-ghost">31 jours ▶</button>
    <button id="refresh" class="btn btn-primary">Actualiser</button>
    <button id="printBtn" class="btn btn-primary">🖨️ Imprimer</button>
  </div>

  <div id="status"></div>
  <div class="print-header" id="printHeader"></div>
  <div id="content"></div>

  <div class="print-footer">
    Document généré par <strong>GESTION ÉTUDIANT</strong> — Conçu et développé par <strong>M. Joan THUILLIER</strong>, Cadre de Santé Apprenant — Pôle 9 Gérontologie-Gériatrie · CHR Metz-Thionville
  </div>
</div>

<script>
// === Ton code JavaScript original (inchangé) ===
grist.ready({requiredAccess: 'full'});

const DAY_NAMES = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const WINDOW_LEN = 31;

let SERVICES = null, PERIODES = null, ETUDIANTS = null, PLANNING = null, CODES = null, SORTIES = null;

// ... (le reste de ton script JS est identique, je ne le recopie pas ici pour gagner de la place)

async function init() {
  await loadData();
  const items = populateServiceSelect();
  const sk = todayKey();
  document.getElementById('startDate').value = sk;
  const windowEnd = addDaysKey(sk, WINDOW_LEN - 1);
  const defaultService = pickDefaultService(items, sk, windowEnd);
  if (defaultService) document.getElementById('service').value = defaultService;
  render();
}

// ... (colle tout le reste de ton <script> original ici : functions loadData, render, saveCode, etc.)

// À la fin du script, garde tes event listeners
document.getElementById('content').addEventListener('click', function (e) {
  const td = e.target.closest('td.editable');
  if (!td || td.querySelector('select')) return;
  startEditCell(td);
});

// ... autres listeners

init();
</script>
</body>
</html>
