<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Planning de service</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #8a8a8a;
    --line: #ece9e4;
    --line-strong: #d8d5cf;
    --surface-alt: #faf9f7;
    --accent: #1d5fae;
    --accent-soft: #eaf2fb;
    --warn: #a8500f;
    --warn-soft: #fbf1e6;
    --period-off: #eeeeec;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: var(--ink); }
  body { padding: 14px; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .controls label { font-size: 12px; font-weight: 600; color: #555; }
  select, input[type="date"] { padding: 5px 9px; border: 1px solid #d7d5d0; border-radius: 6px; font-size: 13px; background: #fff; }
  button { padding: 6px 13px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
  button:hover { background: #154a89; }
  button.secondary { background: #f1efec; color: #333; }
  button.secondary:hover { background: #e5e2dc; }
  h2 { font-size: 16px; margin: 0 0 10px 0; letter-spacing: -.01em; }
  #status { font-size: 12px; color: #999; margin-bottom: 8px; }
  .tablewrap { overflow-x: auto; border: 1px solid var(--line-strong); border-radius: 8px; }
  table { border-collapse: collapse; font-size: 10.5px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  th, td { border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); padding: 5px 6px; text-align: center; }
  th:last-child, td:last-child { border-right: none; }
  th.student, td.student { position: sticky; left: 0; background: #fff; text-align: left; z-index: 2; min-width: 190px; max-width: 220px; white-space: normal; font-weight: 600; border-right: 1px solid var(--line-strong); }
  .student-name { font-weight: 600; letter-spacing: -.005em; }
  .student-info { font-size: 8.5px; color: var(--muted); font-weight: 500; white-space: normal; line-height: 1.4; margin-top: 2px; }
  thead th { background: var(--surface-alt); position: sticky; top: 0; z-index: 1; border-bottom: 1.5px solid var(--line-strong); font-weight: 700; color: #3a3a38; }
  thead th.student { z-index: 3; }
  th.weekend { background: #f3f1ec; }
  td.repos { color: #a8a6a0; font-weight: 600; }
  td.editable { cursor: pointer; }
  td.editable:hover { outline: 1.5px solid var(--accent); outline-offset: -1.5px; border-radius: 3px; }
  td.saving { opacity: .5; }
  td.hors-periode { background: var(--period-off); }
  .badge { display: inline-block; padding: 1px 5px; border-radius: 4px; font-weight: 700; font-size: 10px; }
  .badge-oui { background: var(--accent-soft); color: var(--accent); }
  .rattrapage-x {
    font-size: 9px;
    color: #c2410f;
    font-weight: 700;
    margin-top: 1px;
    line-height: 1;
  }
  .cell-edit-select { width: 100%; font-size: 10.5px; border: none; background: #fdf6e3; }
  .print-header { display: none; }
  .print-footer { display: none; }
  .daynum { font-weight: 700; }
  .dayname { font-size: 8.5px; color: var(--muted); display: block; margin-top: 1px; }
  .legend { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px 16px; align-items: center; font-size: 10px; color: #555; }
  .legend .chip { display: inline-flex; align-items: center; gap: 5px; }
  .legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .empty { padding: 20px; text-align: center; color: #999; font-size: 13px; }
  .version { font-size: 10px; color: #888; margin-left: 12px; }
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
    body { padding: 0; }
    .controls, #status, .no-print { display: none !important; }
    .print-header { display: block !important; margin-bottom: 8px; }
    .print-header h2 { margin: 0 0 2px 0; font-size: 15px; }
    .print-header .meta { font-size: 10.5px; color: #555; }
    .tablewrap { border: none; overflow: visible; }
    table { font-size: 10px; }
    th, td { 
      padding: 2px 3px; 
      border-right: 1px solid #444 !important;
      border-bottom: 1px solid #444 !important;
    }
    th.student, td.student { 
      position: static; 
      min-width: 160px; 
      max-width: 180px; 
      border-right: 2px solid #222 !important;
    }
    .student-name { font-size: 10.5px; }
    .student-info { font-size: 8px; }
    thead th { 
      position: static; 
      border-bottom: 2px solid #222 !important;
    }
    thead tr { height: 66px; }
    td.hors-periode { background: #ddd !important; }
    th.weekend { background: #f5f5f5 !important; border-right: 1.5px solid #333 !important; }
    .badge-oui { background: #e6e6e6 !important; color: #111 !important; border: 1px solid #888; }
    .rattrapage-x {
      font-size: 8.5px;
      color: #222 !important;
      font-weight: 700;
      margin-top: 1px;
    }
    th:not(.student) {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      white-space: nowrap;
      vertical-align: bottom;
      font-size: 9.5px;
    }
    th:not(.student) .daynum, th:not(.student) .dayname { display: inline; }
    th:not(.student) .dayname { margin-left: 3px; }
    td:not(.student) { min-width: 15px; padding: 2px 3px; font-size: 10.5px; font-weight: 700; }
    td.editable:hover { outline: none; }
    .legend { font-size: 9.5px; }
    .print-footer {
      display: block !important;
      position: fixed; bottom: 0; left: 0; right: 0;
      text-align: center; font-size: 8px; color: #999;
      border-top: 1px solid #ccc; padding-top: 4px;
    }
    @page { size: landscape; margin: 8mm; }
  }
</style>
</head>
<body>
<h2 class="no-print">📋 Planning de service <span class="version">v3.3</span></h2>
<div class="controls">
  <label>Service</label>
  <select id="service"></select>
  <label>Début</label>
  <input type="date" id="startDate">
  <label>Vue</label>
  <select id="viewMode">
    <option value="31days">31 jours glissants</option>
    <option value="month">Mois complet</option>
  </select>
  <button id="today" class="secondary">Aujourd'hui</button>
  <button id="prev" class="secondary">◀ Préc</button>
  <button id="next" class="secondary">Suiv ▶</button>
  <button id="refresh">Actualiser</button>
  <button id="printBtn" class="secondary">🖨️ Imprimer</button>
</div>
<div id="status"></div>
<div class="print-header" id="printHeader"></div>
<div id="content"></div>
<div class="print-footer">Document généré automatiquement par l'application <strong>GESTION ÉTUDIANT</strong> v3.3 — Conçu et développé par <strong>M. Joan THUILLIER</strong>, Cadre de Santé Apprenant, pour l'établissement</div>
<script>
grist.ready({requiredAccess: 'full'});
const DAY_NAMES = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
let SERVICES = null, PERIODES = null, ETUDIANTS = null, PLANNING = null, CODES = null, SORTIES = null;

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function keyToDate(key) { return new Date(key + 'T00:00:00Z'); }
function dateToKey(d) { return d.toISOString().slice(0,10); }
function addDaysKey(key, n) { const d = keyToDate(key); d.setUTCDate(d.getUTCDate()+n); return dateToKey(d); }
function epochToKey(epoch) { if (epoch == null) return null; return dateToKey(new Date(epoch*1000)); }
function fmtDateFull(key) {
  const d = keyToDate(key);
  const dd = String(d.getUTCDate()).padStart(2,'0');
  const mm = String(d.getUTCMonth()+1).padStart(2,'0');
  return dd + '/' + mm + '/' + d.getUTCFullYear();
}
function fmtDayLabel(key) {
  const d = keyToDate(key);
  const dd = String(d.getUTCDate()).padStart(2,'0');
  const mm = String(d.getUTCMonth()+1).padStart(2,'0');
  return { num: dd + '/' + mm, name: DAY_NAMES[d.getUTCDay()], isWeekend: (d.getUTCDay() === 0 || d.getUTCDay() === 6) };
}
function getMonthRange(key) {
  if (!key) key = todayKey();
  const d = keyToDate(key);
  const year = d.getUTCFullYear();
  const month = d.getUTCMonth();
  const first = new Date(Date.UTC(year, month, 1));
  const last = new Date(Date.UTC(year, month + 1, 0));
  return {
    startKey: dateToKey(first),
    endKey: dateToKey(last),
    numDays: last.getUTCDate()
  };
}

async function loadData() {
  document.getElementById('status').textContent = 'Chargement des données...';
  [SERVICES, PERIODES, ETUDIANTS, PLANNING, CODES, SORTIES] = await Promise.all([
    grist.docApi.fetchTable('SERVICES'),
    grist.docApi.fetchTable('PERIODES_DE_STAGE'),
    grist.docApi.fetchTable('LISTE_DES_ETUDIANTS'),
    grist.docApi.fetchTable('PLANNING_HEBDO'),
    grist.docApi.fetchTable('CODES_HORAIRES'),
    grist.docApi.fetchTable('Sortie_de_stage')
  ]);
  document.getElementById('status').textContent = '';
}

function buildCodesMap() {
  const map = {};
  for (let i = 0; i < CODES.id.length; i++) {
    map[CODES.id[i]] = {
      Code: CODES.Code[i],
      Duree: (CODES.Duree_heures[i] || 0) + (CODES.Ajustement_h[i] || 0),
      Compte: !!CODES.Compte_stage[i]
    };
  }
  return map;
}
function buildEtudiantsMap() {
  const map = {};
  for (let i = 0; i < ETUDIANTS.id.length; i++) {
    map[ETUDIANTS.id[i]] = (ETUDIANTS.NOM[i] || '') + ' ' + (ETUDIANTS.PRENOM[i] || '');
  }
  return map;
}
function populateServiceSelect() {
  const sel = document.getElementById('service');
  const items = [];
  for (let i = 0; i < SERVICES.id.length; i++) {
    if (!SERVICES.Recoit_des_etudiant[i]) continue;
    items.push({ id: SERVICES.id[i], nom: SERVICES.Nom[i] || ('Service ' + SERVICES.id[i]) });
  }
  items.sort((a,b) => a.nom.localeCompare(b.nom));
  sel.innerHTML = items.map(it => '<option value="' + it.id + '">' + it.nom.replace(/</g,'&lt;') + '</option>').join('');
  return items;
}
function pickDefaultService(items, windowStart, windowEnd) {
  const counts = {};
  for (let i = 0; i < PERIODES.id.length; i++) {
    const du = epochToKey(PERIODES.Du[i]);
    const au = epochToKey(PERIODES.Au[i]);
    if (!du || !au) continue;
    if (au < windowStart || du > windowEnd) continue;
    const sid = PERIODES.Service[i];
    counts[sid] = (counts[sid] || 0) + 1;
  }
  let best = null, bestCount = 0;
  for (const it of items) {
    const c = counts[it.id] || 0;
    if (c > bestCount) { bestCount = c; best = it.id; }
  }
  return best || (items[0] ? items[0].id : null);
}
function buildSortieIndex() {
  const idx = {};
  for (let i = 0; i < SORTIES.id.length; i++) {
    const pid = SORTIES.Pour_le_stage_du_[i];
    const dk = epochToKey(SORTIES.Date[i]);
    if (!pid || !dk) continue;
    idx[pid + '_' + dk] = {
      Compte: !!SORTIES.Compte_stage[i],
      Duree: SORTIES.Duree_heures[i] || 0,
      Motif: SORTIES.Motif[i] || '',
      HeureDebut: SORTIES.Heure_debut ? SORTIES.Heure_debut[i] : null,
      HeureFin: SORTIES.Heure_fin ? SORTIES.Heure_fin[i] : null
    };
  }
  return idx;
}

function render() {
  const startKey = document.getElementById('startDate').value;
  const serviceId = parseInt(document.getElementById('service').value, 10);
  const viewMode = document.getElementById('viewMode').value;
  const content = document.getElementById('content');

  if (!startKey || !serviceId) {
    content.innerHTML = '<div class="empty">Sélectionnez un service et une date.</div>';
    return;
  }

  let days = [];
  let windowStart, windowEnd;

  if (viewMode === 'month') {
    const monthRange = getMonthRange(startKey);
    windowStart = monthRange.startKey;
    windowEnd = monthRange.endKey;
    let current = windowStart;
    for (let i = 0; i < monthRange.numDays; i++) {
      days.push(current);
      current = addDaysKey(current, 1);
    }
  } else {
    // 31 jours glissants
    for (let i = 0; i < 31; i++) {
      days.push(addDaysKey(startKey, i));
    }
    windowStart = days[0];
    windowEnd = days[30];
  }

  const codesMap = buildCodesMap();
  const etudiantsMap = buildEtudiantsMap();
  const sortieIdx = buildSortieIndex();

  const matches = [];
  for (let i = 0; i < PERIODES.id.length; i++) {
    if (PERIODES.Service[i] !== serviceId) continue;
    const du = epochToKey(PERIODES.Du[i]);
    const au = epochToKey(PERIODES.Au[i]);
    if (!du || !au) continue;
    if (au < windowStart || du > windowEnd) continue;
    matches.push({
      periodeId: PERIODES.id[i],
      etudiantId: PERIODES.Etudiant[i],
      du, au,
      niveau: PERIODES.Niveau[i] || '',
      tuteur: PERIODES.Tuteur[i] || ''
    });
  }

  if (matches.length === 0) {
    content.innerHTML = '<div class="empty">Aucun étudiant sur ce service pour cette période.</div>';
    return;
  }

  matches.sort((a,b) => (etudiantsMap[a.etudiantId] || '').localeCompare(etudiantsMap[b.etudiantId] || ''));

  const dayCodeCols = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  const periodeDayMap = {};
  for (let i = 0; i < PLANNING.id.length; i++) {
    const pid = PLANNING.Periode[i];
    const semStart = epochToKey(PLANNING.Semaine_debut[i]);
    if (!semStart) continue;
    if (!periodeDayMap[pid]) periodeDayMap[pid] = {};
    for (let off = 0; off < 7; off++) {
      const dk = addDaysKey(semStart, off);
      periodeDayMap[pid][dk] = { rowId: PLANNING.id[i], col: dayCodeCols[off], coderef: PLANNING[dayCodeCols[off]][i] };
    }
  }

  let html = '<div class="tablewrap"><table><thead><tr><th class="student">Étudiant</th>';
  for (const dk of days) {
    const lbl = fmtDayLabel(dk);
    html += '<th class="' + (lbl.isWeekend ? 'weekend' : '') + '"><span class="daynum">' + lbl.num + '</span><span class="dayname">' + lbl.name + '</span></th>';
  }
  html += '</tr></thead><tbody>';

  for (const m of matches) {
    const nom = etudiantsMap[m.etudiantId] || '—';
    const infoParts = [];
    if (m.niveau) infoParts.push(m.niveau);
    infoParts.push(fmtDateFull(m.du) + ' → ' + fmtDateFull(m.au));
    if (m.tuteur) infoParts.push('Tuteur : ' + m.tuteur);
    const infoLine = infoParts.join(' · ').replace(/</g,'&lt;');

    html += '<tr><td class="student"><div class="student-name">' + nom.replace(/</g,'&lt;') + '</div><div class="student-info">' + infoLine + '</div></td>';

    for (const dk of days) {
      if (dk < m.du || dk > m.au) {
        html += '<td class="hors-periode"></td>';
        continue;
      }
      const cellInfo = (periodeDayMap[m.periodeId] || {})[dk];
      const coderef = cellInfo ? cellInfo.coderef : null;
      const code = coderef ? codesMap[coderef] : null;
      const sortie = sortieIdx[m.periodeId + '_' + dk];

      let cls = '', text = '', title = '';
      if (sortie) {
        if (sortie.Compte) {
          cls = 'sortie-oui';
          text = '<span class="badge badge-oui">' + (code ? code.Code + '+' : '') + 'S</span>';
          title = (sortie.Motif || 'Sortie comptée') + ' (' + sortie.Duree + 'h)';
        } else {
          cls = 'sortie-non';
          let timeInfo = '';
          if (sortie.HeureDebut && sortie.HeureFin) {
            timeInfo = sortie.HeureDebut + '-' + sortie.HeureFin;
          } else if (sortie.Duree) {
            timeInfo = sortie.Duree + 'h';
          }
          text = (code ? code.Code : '') + 
                 '<div class="rattrapage-x">✕ ' + timeInfo + '</div>';
          title = 'Rattrapage / Absence non comptée';
        }
      } else if (code) {
        text = code.Code;
        if (code.Code === 'R' || code.Code === 'ABS') cls = 'repos';
        title = code.Code + (code.Duree ? ' (' + code.Duree + 'h)' : '');
      }

      let dataAttrs = '';
      if (cellInfo) {
        cls += (cls ? ' ' : '') + 'editable';
        dataAttrs = ' data-row-id="' + cellInfo.rowId + '" data-col="' + cellInfo.col + '" data-coderef="' + (coderef || '') + '"';
        if (!title) title = 'Cliquer pour modifier';
      }
      html += '<td class="' + cls + '"' + dataAttrs + ' title="' + title.replace(/"/g,'&quot;') + '">' + text + '</td>';
    }
    html += '</tr>';
  }

  html += '</tbody></table></div>';

  // Légende
  const legendParts = [];
  const seen = {};
  for (let i = 0; i < CODES.id.length; i++) {
    const c = CODES.Code[i];
    if (seen[c]) continue;
    seen[c] = true;
    legendParts.push('<span class="chip"><strong>' + c + '</strong>&nbsp;' + (CODES.Libelle[i] || '') + '</span>');
  }
  legendParts.push('<span class="chip"><span class="badge badge-oui">Code+S</span> sortie comptée</span>');
  legendParts.push('<span class="chip"><span class="rattrapage-x">✕</span> Rattrapage (ne compte pas) — Plage horaire affichée</span>');
  legendParts.push('<span class="chip"><span class="swatch" style="background:var(--period-off);"></span> Hors temps de stage</span>');
  html += '<div class="legend">' + legendParts.join('') + '</div>';

  content.innerHTML = html;

  // Print header
  const serviceLabel = document.getElementById('service').selectedOptions[0]
    ? document.getElementById('service').selectedOptions[0].textContent
    : '';
  const now = new Date();
  const genDate = String(now.getDate()).padStart(2,'0') + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + now.getFullYear()
    + ' à ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  const modeLabel = (viewMode === 'month') ? 'Mois complet' : '31 jours glissants';
  document.getElementById('printHeader').innerHTML =
    '<h2>📋 Planning de service — ' + serviceLabel.replace(/</g,'&lt;') + '</h2>' +
    '<div class="meta">' + modeLabel + ' — Du ' + fmtDayLabel(windowStart).num + ' au ' + fmtDayLabel(windowEnd).num +
    ' &nbsp;·&nbsp; Généré le ' + genDate + '</div>';
}

function shiftPeriod(delta) {
  const viewMode = document.getElementById('viewMode').value;
  let cur = document.getElementById('startDate').value;
  if (!cur) cur = todayKey();
  const d = keyToDate(cur);

  if (viewMode === 'month') {
    d.setUTCMonth(d.getUTCMonth() + delta);
    d.setUTCDate(1);
  } else {
    d.setUTCDate(d.getUTCDate() + (delta * 31));
  }
  document.getElementById('startDate').value = dateToKey(d);
  render();
}

async function init() {
  await loadData();
  const items = populateServiceSelect();

  const sk = todayKey();
  document.getElementById('startDate').value = sk;

  // Par défaut on reste en 31 jours (plus pratique pour la plupart des usages)
  document.getElementById('viewMode').value = '31days';

  const windowEnd = addDaysKey(sk, 30);
  const defaultService = pickDefaultService(items, sk, windowEnd);
  if (defaultService) document.getElementById('service').value = defaultService;

  render();
}

function codesListSorted() {
  const list = [];
  for (let i = 0; i < CODES.id.length; i++) {
    list.push({ id: CODES.id[i], code: CODES.Code[i] || '?', libelle: CODES.Libelle[i] || '' });
  }
  list.sort((a, b) => a.code.localeCompare(b.code));
  return list;
}

function startEditCell(td) {
  const rowId = parseInt(td.dataset.rowId, 10);
  const col = td.dataset.col;
  const currentCoderef = td.dataset.coderef ? parseInt(td.dataset.coderef, 10) : null;
  const originalHTML = td.innerHTML;

  const select = document.createElement('select');
  select.className = 'cell-edit-select';

  const optEmpty = document.createElement('option');
  optEmpty.value = '';
  optEmpty.textContent = '(vide)';
  if (!currentCoderef) optEmpty.selected = true;
  select.appendChild(optEmpty);

  for (const c of codesListSorted()) {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.code + (c.libelle ? ' — ' + c.libelle : '');
    if (currentCoderef === c.id) opt.selected = true;
    select.appendChild(opt);
  }

  td.innerHTML = '';
  td.appendChild(select);
  select.focus();

  let done = false;
  function commit() {
    if (done) return;
    done = true;
    const val = select.value;
    const newCoderef = val ? parseInt(val, 10) : null;
    if (newCoderef === currentCoderef) {
      td.innerHTML = originalHTML;
      return;
    }
    saveCode(rowId, col, newCoderef, td);
  }
  function cancel() {
    if (done) return;
    done = true;
    td.innerHTML = originalHTML;
  }

  select.addEventListener('change', commit);
  select.addEventListener('blur', () => setTimeout(cancel, 0));
}

async function saveCode(rowId, col, newCoderef, td) {
  td.className += ' saving';
  td.innerHTML = '';
  try {
    await grist.docApi.applyUserActions([['UpdateRecord', 'PLANNING_HEBDO', rowId, { [col]: newCoderef }]]);
    await loadData();
    render();
  } catch (err) {
    alert('Erreur lors de la mise à jour : ' + err.message);
    await loadData();
    render();
  }
}

// Event listeners
document.getElementById('content').addEventListener('click', function (e) {
  const td = e.target.closest('td.editable');
  if (!td || td.querySelector('select')) return;
  startEditCell(td);
});

document.getElementById('service').addEventListener('change', render);
document.getElementById('startDate').addEventListener('change', render);
document.getElementById('viewMode').addEventListener('change', render);

document.getElementById('today').addEventListener('click', () => {
  document.getElementById('startDate').value = todayKey();
  render();
});

document.getElementById('prev').addEventListener('click', () => shiftPeriod(-1));
document.getElementById('next').addEventListener('click', () => shiftPeriod(1));

document.getElementById('refresh').addEventListener('click', async () => {
  await loadData();
  render();
});

document.getElementById('printBtn').addEventListener('click', () => {
  window.print();
});

// Raccourci clavier "R" pour actualiser
document.addEventListener('keydown', function(e) {
  if (e.key.toLowerCase() === 'r' && !e.target.matches('input, select, textarea')) {
    e.preventDefault();
    document.getElementById('refresh').click();
  }
});

init();
</script>
</body>
</html>
